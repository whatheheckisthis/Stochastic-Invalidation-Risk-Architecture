[runtime]
seed          = 42
min_r_version = "4.0.0"

[data]
path        = "data/"
output_path = "output/"

[scenarios]
names = ["Baseline", "Liquidity Crunch", "Jurisdictional Freeze", "Counterparty Default", "Hyper-Inflationary"]

[scenarios.Baseline]
distribution     = "beta"
shape1           = 5.0
shape2           = 2.0
ruin_threshold   = 0.10
shock_multiplier = 1.0

[scenarios.Liquidity_Crunch]
distribution     = "beta"
shape1           = 2.0
shape2           = 5.0
ruin_threshold   = 0.15
shock_multiplier = 0.85

[scenarios.Jurisdictional_Freeze]
distribution     = "beta"
shape1           = 1.5
shape2           = 8.0
ruin_threshold   = 0.20
shock_multiplier = 0.75

[scenarios.Counterparty_Default]
distribution     = "powerlaw"
exponent         = 2.5
ruin_threshold   = 0.25
shock_multiplier = 0.65

[scenarios.Hyper_Inflationary]
distribution     = "powerlaw"
exponent         = 3.0
ruin_threshold   = 0.30
fx_devaluation   = 0.40
shock_multiplier = 0.60

[signals]
sell_zscore_threshold = -1.5
watch_spread_threshold = 0.01

[output]
png_width  = 12
png_height = 8
png_dpi    = 150

[liability]
annuity_pool_size = 500000000
payout_rate = 0.045
duration_years = 10
inflation_sensitivity = 1.30
insurer_solvency_buffer = 0.12

[credit]
deployed_capital = 420000000
gross_yield = 0.10
fee_income = 9000000
equity_kicker_value = 4000000
illiquidity_premium = 0.018
default_rate_assumption = 0.03

[dcf]
face_value = 100.0
coupon_rate = 0.095
term_years = 5
discount_rate_base = 0.09
discount_rate_stressed = 0.125
recovery_override = 0.45
impairment_threshold = 0.20

[ma]
ask_price = 350.0
book_face_value = 420.0
synergy_yield_uplift = 18.0
integration_cost = 12.0
minimum_discount_to_par = 0.12

[accretion]
existing_yield = 0.062
